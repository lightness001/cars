<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lightness | Book Transport</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>.serif { font-family: 'Playfair Display', serif; }</style>
</head>
<body class="bg-slate-950 text-white">

    <nav class="p-6 flex justify-between items-center border-b border-white/10">
        <a href="index.html" class="text-xl font-bold serif italic">LIGHTNESS</a>
        <a href="index.html" class="text-sm uppercase tracking-widest text-slate-400">← Back Home</a>
    </nav>

    <header class="py-16 text-center">
        <h1 class="text-5xl serif italic mb-4">Select Your Vehicle</h1>
        <p class="text-slate-400">Premium delivery rates for world-class machines.</p>
    </header>

    <section class="max-w-7xl mx-auto px-6 pb-24 grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <div class="bg-slate-900 rounded-3xl overflow-hidden border border-white/5 hover:border-white/20 transition">
            <img src="https://images.unsplash.com/photo-1555353540-64580b51c258?auto=format&fit=crop&q=80" class="w-full h-64 object-cover" alt="Porsche">
            <div class="p-6">
                <h3 class="text-2xl font-bold mb-2">Porsche 911 GT3</h3>
                <p class="text-slate-500 mb-6 text-sm">Cross-country enclosed transport.</p>
                <div class="flex justify-between items-center">
                    <span class="text-xl font-bold">$1,200</span>
                    <a href="https://wa.me/YOUR_NUMBER?text=I%20want%20to%20book%20the%20Porsche" class="bg-white text-black px-4 py-2 rounded-lg text-sm font-bold">Book Now</a>
                </div>
            </div>
        </div>

        <div class="bg-slate-900 rounded-3xl overflow-hidden border border-white/5 hover:border-white/20 transition">
            <img src="https://images.unsplash.com/photo-1583121274602-3e2820c69888?auto=format&fit=crop&q=80" class="w-full h-64 object-cover" alt="Ferrari">
            <div class="p-6">
                <h3 class="text-2xl font-bold mb-2">Ferrari F8 Tributo</h3>
                <p class="text-slate-500 mb-6 text-sm">VIP White-Glove service only.</p>
                <div class="flex justify-between items-center">
                    <span class="text-xl font-bold">$2,500</span>
                    <a href="https://wa.me/YOUR_NUMBER?text=I%20want%20to%20book%20the%20Ferrari" class="bg-white text-black px-4 py-2 rounded-lg text-sm font-bold">Book Now</a>
                </div>
            </div>
        </div>

        <div class="bg-slate-900 rounded-3xl overflow-hidden border border-white/5 hover:border-white/20 transition">
            <img src="https://images.unsplash.com/photo-1544636331-e26879cd4d9b?auto=format&fit=crop&q=80" class="w-full h-64 object-cover" alt="Range Rover">
            <div class="p-6">
                <h3 class="text-2xl font-bold mb-2">Range Rover SV</h3>
                <p class="text-slate-500 mb-6 text-sm">Heavy-duty luxury logistics.</p>
                <div class="flex justify-between items-center">
                    <span class="text-xl font-bold">$950</span>
                    <a href="https://wa.me/YOUR_NUMBER?text=I%20want%20to%20book%20the%20Range" class="bg-white text-black px-4 py-2 rounded-lg text-sm font-bold">Book Now</a>
                </div>
            </div>
        </div>

    </section>
</body>
</html>
